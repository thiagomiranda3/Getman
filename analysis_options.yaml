# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `fvm flutter analyze`.

# `very_good_analysis` is a strict superset of `flutter_lints` (Very Good
# Ventures). It is the project baseline; tighten/loosen via the `linter.rules`
# block below rather than swapping the include.
include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    # The project-local lint plugin is its own package (own pubspec/deps); the
    # app analyzer must not descend into it.
    - "tools/**"
  # custom_lint runs the project-local architecture rules (tools/getman_lints)
  # plus any other custom_lint plugins. NOTE: these do NOT surface in
  # `fvm flutter analyze` — they are a separate pass, run via
  # `fvm dart run custom_lint` (wired into the pre-commit hook + the
  # verification bar in CLAUDE.md §5).
  plugins:
    - custom_lint
  errors:
    # VGA enables `close_sinks` but pins it to `ignore`; re-promote it so
    # undisposed StreamController/Sink fields are caught (RealtimeService etc.).
    close_sinks: warning

linter:
  rules:
    # Rules CLAUDE.md depends on (all already enabled by VGA — pinned here so
    # they survive a baseline swap and document intent):
    avoid_print: true
    use_build_context_synchronously: true
    always_use_package_imports: true
    directives_ordering: true
    unawaited_futures: true
    # Companion to unawaited_futures (already on): flags fire-and-forget futures
    # in non-async contexts (constructors, void callbacks). Not in VGA.
    discarded_futures: true

    # Disabled: `public_member_api_docs` requires a doc comment on every public
    # member. It targets *published package* APIs; Getman is an application, so
    # documenting every internal member is noise, not value. (This is the one
    # VGA rule we opt out of.)
    public_member_api_docs: false

# bloc_lint config (the bloc team's official rules). NOT read by the analyzer —
# it is a separate pass run via `fvm dart run bloc_tools:bloc lint lib`
# (wired into the pre-commit hook + the verification bar in CLAUDE.md §5).
# Rule set: bloc_lint's "recommended".
bloc:
  rules:
    - avoid_flutter_imports
    - avoid_public_bloc_methods
    - avoid_public_fields
    - prefer_file_naming_conventions
    - prefer_void_public_cubit_methods

# custom_lint runs in opt-in mode: only the rules listed here are active. This
# keeps solid_lints scoped to the three pure-metric rules (no VGA overlap) while
# preserving the getman_lints architecture rules.
custom_lint:
  enable_all_lint_rules: false
  rules:
    # getman_lints (project-local architecture rules)
    - avoid_get_it_in_widgets
    - avoid_hardcoded_brand_colors
    - domain_no_infrastructure_imports
    - bloc_depends_on_abstractions
    - platform_io_outside_io_files
    - equatable_props_complete
    # solid_lints — cherry-picked metrics only. Regression-gate baselines set
    # just above the current codebase max so the gate is green now and only
    # FUTURE drift beyond these bounds is blocked (tunable downward later).
    #
    # SCOPING NOTE: the standalone `dart run custom_lint` runner reads ONLY the
    # package-root analysis_options (it does NOT honor nested test/ or
    # integration_test/ analysis_options, unlike the IDE analysis server), and
    # neither custom_lint nor solid_lints offers a per-rule path/glob exclude —
    # so these three metrics necessarily apply to test/ + integration_test/ too.
    #   - cyclomatic_complexity (50): driven by lib/ (curl_utils.parse ≈ 49-50);
    #     no test exceeds it — this is a meaningful PRODUCTION-code threshold.
    #   - number_of_parameters (50): driven by lib/ (SettingsEntity.copyWith ≈ 47
    #     params); no test has >8 params — also a meaningful PRODUCTION threshold.
    #   - function_lines_of_code (1000): INFLATED by long test main() bodies (the
    #     largest test main() ≈ 937 lines). The lib/-only max is ~380
    #     (rpgTheme builder), so a production-meaningful value would be ~400;
    #     1000 only keeps the test bodies green. Tighten to 400 once test main()s
    #     are excludable (e.g. a future custom_lint with path-glob exclude).
    #
    # NOTE the flat/sibling YAML format: the threshold key sits at the SAME indent
    # as the rule name (custom_lint_core reads sibling keys in the list-map entry,
    # not children nested under the rule name).
    - cyclomatic_complexity:
      max_complexity: 50
    - number_of_parameters:
      max_parameters: 50
    - function_lines_of_code:
      max_lines: 1000
