name: getman
description: "A fast and nice http program"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  collection: ^1.18.0
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  equatable: ^2.0.8
  file_picker: ^8.0.0+1
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  go_router: ^17.2.0
  google_fonts: ^6.2.1
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  re_editor: ^0.8.0
  re_highlight: ^0.0.3
  shimmer: ^3.0.0
  two_dimensional_scrollables: ^0.3.3
  uuid: ^4.5.1
  web_socket_channel: ^3.0.0

dev_dependencies:
  bloc_lint: ">=0.3.0 <1.0.0"
  bloc_tools: ">=0.1.0-dev.8 <1.0.0"
  build_runner: ^2.4.13
  custom_lint: ^0.8.0
  fake_async: ^1.3.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  getman_lints:
    path: tools/getman_lints
  hive_ce_generator: ">=1.4.0 <2.0.0"
  mocktail: ^1.0.5
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  assets:
    # Pre-bundled Google Fonts (named per google_fonts' asset convention) so
    # no font is ever fetched over HTTP at runtime. Licenses live alongside
    # in assets/google_fonts/licenses/ (OFL).
    - assets/google_fonts/
