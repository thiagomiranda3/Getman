name: getman
description: "A fast and nice http program"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  collection: ^1.18.0
  re_editor: ^0.8.0
  re_highlight: ^0.0.3
  google_fonts: ^6.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_fancy_tree_view: ^1.1.1
  uuid: ^4.5.1
  shimmer: ^3.0.0
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  go_router: ^17.2.0
  equatable: ^2.0.8
  file_picker: ^8.0.0+1
  web_socket_channel: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    # Pre-bundled Google Fonts (named per google_fonts' asset convention) so
    # no font is ever fetched over HTTP at runtime. Licenses live alongside
    # in assets/google_fonts/licenses/ (OFL).
    - assets/google_fonts/
