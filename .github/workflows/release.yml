name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag label for artifact names (manual runs do not publish a release).'
        required: true
        default: 'v0.0.0-dev'

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.41.6'

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release

      - name: Package .app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/getman.app \
            "getman-${VERSION}-macos-arm64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: getman-*-macos-arm64.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package Windows build
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build\windows\x64\runner\Release\* `
            -DestinationPath "getman-$env:VERSION-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: getman-*-windows-x64.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package Linux bundle
        run: |
          tar -czf "getman-${VERSION}-linux-x64.tar.gz" \
            -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: getman-*-linux-x64.tar.gz
          if-no-files-found: error

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build web --release

      - name: Package Web build
        run: |
          (cd build/web && zip -r "../../getman-${VERSION}-web.zip" .)

      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: getman-*-web.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows, build-linux, build-web]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
