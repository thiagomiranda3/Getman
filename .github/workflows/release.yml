name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag label for artifact names (manual runs do not publish a release).'
        required: true
        default: 'v0.0.0-dev'

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.44.4'

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      # Stamp the app version from the git tag (strip leading `v`) so the in-app
      # updater compares against the tag, not whatever is in pubspec.yaml.
      - run: flutter build macos --release --build-name="${VERSION#v}" --build-number="${{ github.run_number }}"

      - name: Package .dmg
        run: |
          mkdir -p dmg_staging
          cp -R build/macos/Build/Products/Release/getman.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "Getman" -srcfolder dmg_staging \
            -ov -format UDZO "getman-${VERSION}-macos-arm64.dmg"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: macos
          path: getman-*-macos-arm64.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
      # pdfx downloads pdfium and configures it with a nested CMake whose
      # cmake_minimum_required predates 3.5; CMake 4.x on the runner refuses
      # that unless we raise the policy floor. This env var is CMake's own
      # suggested remedy and propagates into the nested configure.
      CMAKE_POLICY_VERSION_MINIMUM: '3.5'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter config --enable-windows-desktop
      - run: flutter pub get

      # Stamp the app version from the git tag (strip leading `v`) so the in-app
      # updater compares against the tag, not whatever is in pubspec.yaml.
      - name: Build Windows
        shell: pwsh
        # The audioplayers_windows plugin includes <experimental/coroutine>, which the
        # runner's MSVC now rejects with a hard error (STL1011) unless this macro is set.
        # cl.exe reads the CL env var and prepends it to every compile, so the define
        # reaches the plugin's own .vcxproj without patching generated build files.
        env:
          CL: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS
        run: |
          $ver = $env:VERSION -replace '^v',''
          flutter build windows --release --build-name="$ver" --build-number="${{ github.run_number }}"

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $ver = $env:VERSION -replace '^v',''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="$ver" windows\installer.iss

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows
          path: build/installer/getman-*-windows-x64-setup.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
      # Same nested-pdfium / CMake-4 policy-floor issue as Windows (see above).
      CMAKE_POLICY_VERSION_MINIMUM: '3.5'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          # libmpv is required by media_kit_video — its CMakeLists links
          # PkgConfig::mpv, so the build fails to configure without the dev
          # package; mpv provides the runtime libmpv for native playback.
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config \
            libmpv-dev mpv

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      # Stamp the app version from the git tag (strip leading `v`) so the in-app
      # updater compares against the tag, not whatever is in pubspec.yaml.
      - run: flutter build linux --release --build-name="${VERSION#v}" --build-number="${{ github.run_number }}"

      - name: Package AppImage
        run: |
          export ARCH=x86_64
          APPDIR=AppDir
          mkdir -p "$APPDIR/usr/bin"
          cp -r build/linux/x64/release/bundle/* "$APPDIR/usr/bin/"
          cp linux/packaging/getman.desktop "$APPDIR/getman.desktop"
          cp linux/icon.png "$APPDIR/getman.png"
          cp linux/packaging/AppRun "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract-and-run \
            "$APPDIR" "getman-${VERSION}-linux-x86_64.AppImage"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: linux
          path: getman-*-linux-x86_64.AppImage
          if-no-files-found: error

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build web --release

      - name: Package Web build
        run: |
          (cd build/web && zip -r "../../getman-${VERSION}-web.zip" .)

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: web
          path: getman-*-web.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows, build-linux, build-web]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts

      - name: Extract changelog notes for this tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            /^## \[/ && flag {exit}
            flag {print}
          ' CHANGELOG.md > release_notes.md || true
          if [ ! -s release_notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}." > release_notes.md
          fi

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          draft: false
          body_path: release_notes.md
          generate_release_notes: true
          files: artifacts/*
